<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="GameNI - Belfast's Sports Booking & Matchmaking Platform" />
  <title>GameNI – Book Venues & Find Players</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script type="module" crossorigin src="/gamein/assets/index-ldGDc8UZ.js"></script>
  <link rel="stylesheet" crossorigin href="/gamein/assets/index-Cy8iDULZ.css">
</head>
<body>

  <div class="app-shell">

    <!-- ── Top Nav ── -->
    <header class="top-nav">

      <!-- Brand -->
      <button class="top-nav-brand" id="nav-logo">
        <span class="brand-bolt">⚡</span>
        <span class="brand-word">GAME<span class="brand-ni">NI</span></span>
      </button>

      <!-- Desktop nav links -->
      <nav class="top-nav-links">
        <button class="nav-top-link active" data-page="home">Home</button>
        <button class="nav-top-link" data-page="book">Venues</button>
        <button class="nav-top-link" data-page="play">Matches</button>
        <button class="nav-top-link" data-page="history">History</button>
      </nav>

      <!-- Right side -->
      <div class="top-nav-right">
        <div class="top-nav-city">
          <span class="city-live-dot"></span>
          <select id="city-select" class="city-select">
            <option value="belfast">Belfast</option>
            <option value="derry" disabled>Derry — soon</option>
          </select>
        </div>

        <button class="btn-host-nav" id="header-create-btn">
          <i class="fas fa-plus"></i> Host Game
        </button>

        <div id="unauth-controls" class="nav-auth-row">
          <button class="btn-ghost-nav" id="btn-login">Log in</button>
          <button class="btn-pill-nav" id="btn-signup">Sign up</button>
        </div>
        <div id="auth-controls" class="nav-user-row hidden">
          <div class="nav-avatar" id="user-avatar-initials">U</div>
          <span class="nav-user-name" id="user-display-name"></span>
          <button class="btn-icon-nav" id="btn-logout" aria-label="Log out">
            <i class="fas fa-sign-out-alt"></i>
          </button>
        </div>
      </div>

    </header>

    <!-- ── Content ── -->
    <main id="app-content" class="content-area"></main>

  </div>

  <!-- Auth Modal -->
  <div class="modal-overlay" id="auth-modal">
    <div class="modal" id="auth-modal-content">
      <button class="modal-close" id="modal-close"><i class="fas fa-times"></i></button>
      <div class="modal-body">
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login" id="tab-login">Log In</button>
          <button class="auth-tab" data-tab="signup" id="tab-signup">Sign Up</button>
        </div>
        <form class="auth-form" id="login-form">
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="Your password" required>
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="login-submit">Log In</button>
          <div class="auth-divider"><span>or</span></div>
          <button type="button" class="btn btn-social" id="google-login">
            <i class="fab fa-google"></i> Continue with Google
          </button>
        </form>
        <form class="auth-form hidden" id="signup-form">
          <div class="form-group">
            <label for="signup-name">Full Name</label>
            <input type="text" id="signup-name" placeholder="Your name" required>
          </div>
          <div class="form-group">
            <label for="signup-email">Email</label>
            <input type="email" id="signup-email" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label for="signup-password">Password</label>
            <input type="password" id="signup-password" placeholder="Create a password" required>
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="signup-submit">Create Account</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Booking Modal -->
  <div class="modal-overlay" id="booking-modal">
    <div class="modal modal-lg">
      <button class="modal-close" id="booking-close"><i class="fas fa-times"></i></button>
      <div class="modal-body" id="booking-body"></div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-container" id="toast-container"></div>

</body>
</html>
